# XcodeGen project definition — the source of truth for the Xcode project.
# On the Mac VM:  brew install xcodegen && cd ios/KlartextProbe && xcodegen generate
# then open KlartextProbe.xcodeproj (or build with xcodebuild). The .xcodeproj and the
# generated Info.plist are gitignored; regenerate them from this file.
name: KlartextProbe

options:
  bundleIdPrefix: ch.cherkaoui.klartext
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"                 # Swift 6 language mode
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  KlartextProbe:
    type: application
    platform: iOS
    sources:
      - KlartextProbe
    info:
      path: KlartextProbe/Info.plist     # generated by xcodegen from the properties below
      properties:
        CFBundleDisplayName: KlartextProbe
        UILaunchScreen: {}               # full-screen SwiftUI launch, no storyboard
        NSLocalNetworkUsageDescription: >-
          KlartextProbe connects to your car's diagnostic gateway over the
          USB-C Ethernet link.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ch.cherkaoui.klartext.probe
        GENERATE_INFOPLIST_FILE: NO      # the info block above is authoritative
        TARGETED_DEVICE_FAMILY: 1        # iPhone
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  KlartextProbeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - KlartextProbeTests
    dependencies:
      - target: KlartextProbe
